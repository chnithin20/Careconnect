{% extends "base.html" %}
{% block content %}
<div class="dashboard-container">
    <aside class="sidebar glass-card outfit">
        <div class="logo" style="margin-bottom: 2rem;"><i class="ph-bold ph-test-tube"></i> <span>Lab</span>Portal</div>
        <nav class="sidebar-menu">
            <a href="/dashboard/diagnostic" class="sidebar-item"><i class="ph ph-list-checks"></i> Pending Tests</a>
            <a href="/diagnostic/upload" class="sidebar-item active"><i class="ph ph-upload-simple"></i> Upload Results</a>
            <a href="/diagnostic/history" class="sidebar-item"><i class="ph ph-clock-counter-clockwise"></i> History</a>
        </nav>
        <div style="margin-top: auto;"><a href="/login" class="btn btn-outline" style="width: 100%;">Logout</a></div>
    </aside>
    <main class="dashboard-content">
        <header class="section-header outfit">
            <div>
                <h1>Upload <span>Results</span></h1>
                <p style="color: var(--text-muted);">Submit lab reports for assignment to patient records.</p>
            </div>
        </header>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
            <div class="glass-card" style="border: 2px dashed var(--surface-border); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4rem 2rem; cursor: pointer;" onclick="document.getElementById('labUpload').click()">
                <i class="ph ph-cloud-arrow-up" style="font-size: 4rem; color: var(--primary); margin-bottom: 1.5rem;"></i>
                <h3>Upload Lab Report</h3>
                <p style="color: var(--text-muted); margin-top: 1rem; text-align: center;">Drop PDF or image files here to submit to the patient record system.</p>
                <input type="file" id="labUpload" hidden accept=".pdf,.jpg,.png">
                <button class="btn btn-outline" style="margin-top: 2rem;">Browse Files</button>
            </div>

            <div class="glass-card">
                <h3 style="margin-bottom: 1.5rem;">Assign to Patient</h3>
                <form onsubmit="event.preventDefault(); alert('Report assigned to patient successfully!')" style="display: flex; flex-direction: column; gap: 1.25rem;">
                    <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                        <label style="font-size: 0.9rem; color: var(--text-muted);">Patient ID</label>
                        <input type="text" placeholder="e.g., #CC001" style="padding: 1rem; background: var(--surface); border: 1px solid var(--surface-border); border-radius: 12px; color: white;" required>
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                        <label style="font-size: 0.9rem; color: var(--text-muted);">Test Type</label>
                        <select style="padding: 1rem; background: var(--surface); border: 1px solid var(--surface-border); border-radius: 12px; color: white;">
                            <option>CBC Blood Count</option>
                            <option>Lipid Profile</option>
                            <option>Blood Sugar (HbA1c)</option>
                            <option>ECG Report</option>
                            <option>X-Ray / Radiology</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Submit to Record <i class="ph ph-upload-simple"></i></button>
                </form>
            </div>
        </div>
    </main>
</div>
{% endblock %}

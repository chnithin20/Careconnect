{% extends "base.html" %}
{% block content %}
<div class="dashboard-container">
    <aside class="sidebar glass-card outfit">
        <div class="logo" style="margin-bottom: 2rem;"><i class="ph-bold ph-heartbeat"></i> <span>Patient</span>Portal</div>
        <nav class="sidebar-menu">
            <a href="/dashboard/patient" class="sidebar-item"><i class="ph ph-house"></i> Home</a>
            <a href="/patient/reminders" class="sidebar-item"><i class="ph ph-bell"></i> Reminders</a>
            <a href="/patient/chat" class="sidebar-item active"><i class="ph ph-chat-centered-dots"></i> Chat with Children</a>
        </nav>
        <div style="margin-top: auto;"><a href="/login" class="btn btn-outline" style="width: 100%;">Logout</a></div>
    </aside>
    <main class="dashboard-content">
        <header class="section-header outfit">
            <div>
                <h1>Family <span>Chat</span></h1>
                <p style="color: var(--text-muted);">Live messages with your children — updates instantly on both sides.</p>
            </div>
            <div id="onlineIndicator" style="display:flex; align-items:center; gap:0.5rem; color: #4ade80; font-size:0.9rem;">
                <span style="width:8px; height:8px; border-radius:50%; background:#4ade80; animation: pulse 2s infinite;"></span>
                Live
            </div>
        </header>

        <div class="glass-card" style="display: flex; flex-direction: column; height: 65vh;">
            <div id="chatMessages" style="flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; padding: 1.5rem; padding-bottom: 0.5rem;"></div>

            <div style="display: flex; gap: 1rem; padding: 1.5rem; border-top: 1px solid var(--surface-border);">
                <input type="text" id="chatInput" placeholder="Type a message to your children..." 
                    style="flex: 1; padding: 1rem 1.25rem; background: var(--surface); border: 1px solid var(--surface-border); border-radius: 50px; color: white; font-size: 1rem; outline: none;">
                <button id="sendBtn" class="btn btn-primary" style="padding: 0 1.5rem; border-radius: 50px;" onclick="sendMessage()">
                    <i class="ph ph-paper-plane-right"></i>
                </button>
            </div>
        </div>
    </main>
</div>
<a href="/emergency" class="sos-btn outfit">SOS</a>
{% endblock %}
{% block extra_scripts %}
<script>
const ROLE = 'patient';
const SENDER_NAME = 'Dad (Patient)';
let lastTs = 0;

function renderMessage(msg) {
    const isMe = msg.sender === ROLE;
    const div = document.createElement('div');
    div.dataset.id = msg.id;
    div.style.cssText = `align-self: ${isMe ? 'flex-end' : 'flex-start'}; max-width: 75%; display: flex; flex-direction: column; gap: 0.3rem;`;
    div.innerHTML = `
        <div style="font-size:0.78rem; color:var(--text-muted); ${isMe ? 'text-align:right;' : ''}">${msg.sender_name} &bull; ${msg.timestamp}</div>
        <div style="padding: 0.9rem 1.2rem; border-radius: 16px; ${isMe
            ? 'background: rgba(59,130,246,0.15); border: 1px solid var(--primary); border-bottom-right-radius: 4px;'
            : 'background: var(--surface); border-bottom-left-radius: 4px;'} line-height:1.5; font-size:0.97rem;">${msg.text}</div>
    `;
    return div;
}

async function loadMessages(initial = false) {
    const url = initial ? '/api/chat/messages' : `/api/chat/messages?since=${lastTs}`;
    const res = await fetch(url);
    const msgs = await res.json();
    if (!msgs.length) return;

    const box = document.getElementById('chatMessages');
    const wasAtBottom = box.scrollHeight - box.scrollTop <= box.clientHeight + 50;

    msgs.forEach(msg => {
        if (!document.querySelector(`[data-id="${msg.id}"]`)) {
            box.appendChild(renderMessage(msg));
            lastTs = Math.max(lastTs, msg.ts);
        }
    });
    if (initial || wasAtBottom) box.scrollTop = box.scrollHeight;
}

async function sendMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';

    await fetch('/api/chat/send', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ sender: ROLE, sender_name: SENDER_NAME, text })
    });
    await loadMessages();
}

document.getElementById('chatInput').addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

// Load on start, then poll every 2 seconds for new messages
loadMessages(true);
setInterval(() => loadMessages(false), 2000);
</script>
<style>@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }</style>
{% endblock %}

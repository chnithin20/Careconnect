{% extends "base.html" %}

{% block container_class %}body-centered{% endblock %}

{% block content %}
<div class="glass-card animate-fade-in" style="width: 100%; max-width: 450px; text-align: center;">
    <div class="logo outfit" style="justify-content: center; margin-bottom: 2rem; font-size: 2rem;">
        <i class="ph-bold ph-heartbeat"></i> <span>Care</span>Connect
    </div>
    <h2 style="margin-bottom: 1rem;">Welcome Back</h2>
    <p style="color: var(--text-muted); margin-bottom: 2.5rem;">Access your family health center.</p>

    <form id="loginForm" style="display: flex; flex-direction: column; gap: 1.5rem; text-align: left;">
        <div style="display: flex; flex-direction: column; gap: 0.5rem;">
            <label style="font-size: 0.9rem; color: var(--text-muted);">Email Address</label>
            <input id="loginEmail" type="email" placeholder="name@example.com" class="glass" style="padding: 1rem; border: 1px solid var(--surface-border); border-radius: 12px; color: white; width: 100%;" required>
        </div>
        <div style="display: flex; flex-direction: column; gap: 0.5rem;">
            <label style="font-size: 0.9rem; color: var(--text-muted);">Password</label>
            <input id="loginPassword" type="password" placeholder="Password" class="glass" style="padding: 1rem; border: 1px solid var(--surface-border); border-radius: 12px; color: white; width: 100%;" required>
        </div>
        <div style="display: flex; flex-direction: column; gap: 0.5rem;">
            <label style="font-size: 0.9rem; color: var(--text-muted);">Log In As</label>
            <select id="roleSelect" class="glass" style="padding: 1rem; border: 1px solid var(--surface-border); border-radius: 12px; color: white; background: #000c24; width: 100%;">
                <option value="patient">Patient (Elderly)</option>
                <option value="children">Children (Family Manager)</option>
                <option value="doctor">Hospital Doctor</option>
                <option value="hospital-admin">Hospital Admin</option>
                <option value="diagnostic">Diagnostic Center</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary" style="padding: 1rem; width: 100%; justify-content: center; margin-top: 1rem;">Sign In <i class="ph ph-sign-in"></i></button>
    </form>

    <div id="loginMsg" style="display:none; margin-top:1rem; text-align:left;"></div>

    <div style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--surface-border); font-size: 0.9rem; color: var(--text-muted);">
        Don't have an account? <a href="/signup" style="color: var(--primary); font-weight: 600;">Sign up free</a>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
function showLoginMsg(message, ok) {
    const el = document.getElementById('loginMsg');
    el.style.display = 'block';
    el.style.cssText = `display:block; margin-top:1rem; padding:0.85rem 1rem; border-radius:10px; border-left:4px solid ${ok ? 'var(--success)' : 'var(--danger)'}; background:${ok ? 'rgba(16,185,129,0.08)' : 'rgba(239,68,68,0.08)'}; color:${ok ? 'var(--success)' : 'var(--danger)'}; font-size:0.9rem;`;
    el.textContent = message;
}

document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const payload = {
        email: document.getElementById('loginEmail').value.trim(),
        password: document.getElementById('loginPassword').value,
        role: document.getElementById('roleSelect').value
    };

    const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
    });
    const data = await res.json().catch(() => ({}));

    if (res.ok) {
        showLoginMsg('Login successful. Redirecting...', true);
        setTimeout(() => {
            window.location.href = data.dashboard || '/dashboard/children';
        }, 500);
    } else {
        showLoginMsg(data.error || 'Login failed. Please check your credentials.', false);
    }
});
</script>
{% endblock %}

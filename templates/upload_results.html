{% extends "base.html" %}

{% block content %}
    <div class="dashboard-container">
        <aside class="sidebar glass-card outfit">
            <div class="logo" style="margin-bottom: 2rem;"><i class="ph-bold ph-test-tube"></i> <span>Lab</span>Portal</div>
            <nav class="sidebar-menu">
                <a href="/dashboard/diagnostic" class="sidebar-item"><i class="ph ph-list-checks"></i> Pending Tests</a>
                <a href="/diagnostic/upload" class="sidebar-item active"><i class="ph ph-upload-simple"></i> Upload Results</a>
                <a href="/diagnostic/history" class="sidebar-item"><i class="ph ph-clock-counter-clockwise"></i> History</a>
            </nav>
            <div style="margin-top: auto;"><a href="/login" class="btn btn-outline" style="width: 100%;">Logout</a></div>
        </aside>

        <main class="dashboard-content">
            <header class="section-header outfit">
                <div>
                    <h1>Submit <span>Lab Results</span></h1>
                    <p style="color: var(--text-muted);">Securely upload reports for doctor and patient access.</p>
                </div>
            </header>

            <div class="glass-card fade-in" style="padding: 2rem; max-width: 600px; margin: 0 auto; margin-bottom: 2rem; border-top: 4px solid var(--primary);">
                <form onsubmit="event.preventDefault(); alert('Report successfully uploaded to the system!'); window.location.href='/dashboard/diagnostic';">
                    <div style="margin-bottom: 1.5rem;">
                        <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Patient ID or Name</label>
                        <input type="text" placeholder="e.g. William Roberts" class="form-control" style="width: 100%; box-sizing: border-box;" required>
                    </div>

                    <div style="margin-bottom: 1.5rem;">
                        <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Test Category</label>
                        <select class="form-control" style="width: 100%; box-sizing: border-box;" required>
                            <option>Complete Blood Count (CBC)</option>
                            <option>Lipid Profile</option>
                            <option>Metabolic Panel</option>
                            <option>Urinalysis</option>
                        </select>
                    </div>
                    
                    <div style="margin-bottom: 2rem;">
                        <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Upload PDF / Image</label>
                        <div style="border: 2px dashed var(--surface-border); padding: 2rem; text-align: center; border-radius: 12px; cursor: pointer; background: var(--background);">
                            <i class="ph ph-file-pdf" style="font-size: 3rem; color: var(--danger); margin-bottom: 1rem;"></i>
                            <p style="color: var(--text-muted);">Click to browse, or drag & drop</p>
                            <input type="file" required style="display: none;" id="fileinp">
                            <button type="button" class="btn btn-outline" style="margin-top: 1rem;" onclick="document.getElementById('fileinp').click()">Browse Files</button>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 1rem;"><i class="ph ph-upload-simple"></i> Upload to Cloud</button>
                </form>
            </div>

        </main>
    </div>
{% endblock %}

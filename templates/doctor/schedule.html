{% extends "base.html" %}
{% block content %}
<div class="dashboard-container">
    <aside class="sidebar glass-card outfit">
        <div class="logo" style="margin-bottom: 2rem;"><i class="ph-bold ph-heartbeat"></i> <span>Doctor</span>Portal</div>
        <nav class="sidebar-menu">
            <a href="/dashboard/doctor" class="sidebar-item"><i class="ph ph-users-three"></i> Patients List</a>
            <a href="/doctor/schedule" class="sidebar-item active"><i class="ph ph-calendar-bold"></i> Today's Schedule</a>
            <a href="/doctor/consultations" class="sidebar-item"><i class="ph ph-note-pencil"></i> Consultations</a>
        </nav>
        <div style="margin-top: auto;"><a href="/login" class="btn btn-outline" style="width: 100%;">Logout</a></div>
    </aside>
    <main class="dashboard-content">
        <header class="section-header outfit">
            <div>
                <h1>Today's <span>Schedule</span></h1>
                <p style="color: var(--text-muted);">All appointments update live when families book.</p>
            </div>
            <div style="display:flex; align-items:center; gap:0.5rem; color:#4ade80; font-size:0.9rem;">
                <span style="width:8px; height:8px; border-radius:50%; background:#4ade80; animation:pulse 2s infinite;"></span>
                Live Sync
            </div>
        </header>

        <div class="glass-card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
                <h3>Appointment Queue <span id="apptCount" style="font-size:0.9rem; color:var(--text-muted); font-weight:400;"></span></h3>
            </div>
            <div id="apptList" style="display:flex; flex-direction:column; gap:1rem;">
                <p style="color:var(--text-muted);">Loading schedule...</p>
            </div>
        </div>
    </main>
</div>
{% endblock %}
{% block extra_scripts %}
<script>
async function loadSchedule() {
    const res = await fetch('/api/appointments');
    const apts = await res.json();
    const list = document.getElementById('apptList');
    const count = document.getElementById('apptCount');
    list.innerHTML = '';

    if (!apts.length) {
        count.textContent = '(0)';
        list.innerHTML = '<p style="color:var(--text-muted);">No appointments yet. Families can book from their portal.</p>';
        return;
    }

    count.textContent = `(${apts.length})`;
    apts.forEach((apt) => {
        const dateStr = apt.date
            ? new Date(apt.date + 'T00:00:00').toLocaleDateString('en-GB', {day:'numeric', month:'short', year:'numeric'})
            : 'TBD';
        const div = document.createElement('div');
        div.style.cssText = `padding:1.5rem; background:var(--surface); border-radius:16px; display:flex; align-items:center; justify-content:space-between; border-left:4px solid ${apt.status === 'Confirmed' ? 'var(--success)' : 'var(--accent)'};`;
        div.innerHTML = `
            <div>
                <div style="font-weight:700; font-size:1.05rem;">Patient: ${apt.patient_name}</div>
                <div style="font-size:0.88rem; color:var(--text-muted); margin-top:0.3rem;">
                    <i class="ph ph-user-circle"></i> ${apt.doctor} &nbsp;|&nbsp;
                    <i class="ph ph-stethoscope"></i> ${apt.department} &nbsp;|&nbsp;
                    <i class="ph ph-calendar"></i> ${dateStr} &nbsp;|&nbsp;
                    <i class="ph ph-clock"></i> ${apt.time || 'TBD'}
                </div>
                <div style="font-size:0.8rem; color:var(--text-muted); margin-top:0.4rem;">Booked by: <strong style="color:#cbd5e1;">${apt.booked_by || 'children'}</strong></div>
            </div>
            <div style="display:flex; gap:0.75rem; align-items:center;">
                <a href="/doctor/consultations" class="btn btn-outline" style="font-size:0.85rem; padding:0.5rem 1.2rem;"><i class="ph ph-note-pencil"></i> Add Note</a>
                <span style="background:${apt.status === 'Confirmed' ? 'rgba(16,185,129,0.1)' : 'rgba(168,85,247,0.1)'}; color:${apt.status === 'Confirmed' ? 'var(--success)' : 'var(--accent)'}; padding:0.4rem 1rem; border-radius:20px; font-size:0.8rem; font-weight:600;">${apt.status}</span>
            </div>
        `;
        list.appendChild(div);
    });
}

loadSchedule();
setInterval(loadSchedule, 5000);
</script>
<style>@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}</style>
{% endblock %}

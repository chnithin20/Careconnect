<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Video Session | CareConnect</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: 'Outfit', sans-serif; color: white; }
        .video-container { display: flex; flex-direction: column; height: 100vh; position: relative; }
        .video-header { padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); z-index: 10; position: absolute; width: 100%; box-sizing: border-box; }
        #localVideo { width: 100%; height: 100%; object-fit: cover; }
        .controls { position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%); display: flex; gap: 1.5rem; z-index: 10; background: rgba(0,0,0,0.5); padding: 1rem 2rem; border-radius: 50px; backdrop-filter: blur(10px); }
        .ctrl-btn { width: 50px; height: 50px; border-radius: 50%; border: none; background: rgba(255,255,255,0.1); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; transition: all 0.2s; }
        .ctrl-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.05); }
        .ctrl-btn.danger { background: #ef4444; }
        .ctrl-btn.danger:hover { background: #dc2626; }
        .waiting-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.6); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 5; text-align: center; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .muted { color: #ef4444 !important; }
        .status-pill { background: rgba(34, 197, 94, 0.2); color: #4ade80; padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.9rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
    </style>
</head>
<body>
    <div class="video-container">
        <div class="video-header">
            <div style="font-weight: 600; font-size: 1.2rem; display: flex; align-items: center; gap: 0.5rem;"><i class="ph-fill ph-lock-key"></i> Encrypted Session</div>
            <div class="status-pill"><i class="ph-fill ph-check-circle"></i> Connection Secure</div>
            <div id="timer" style="font-variant-numeric: tabular-nums; font-weight: 600;">00:00</div>
        </div>
        
        <video id="localVideo" autoplay muted playsinline></video>
        
        <div class="waiting-overlay" id="waitingLayer">
            <h2 style="font-size: 2.5rem; margin-bottom: 1rem; text-shadow: 0 2px 10px rgba(0,0,0,0.5);">Waiting for Participants...</h2>
            <p style="color: #cbd5e1; font-size: 1.2rem;">Your camera is active. Please hold on momentarily.</p>
            <div style="margin-top: 2rem;">
                <i class="ph ph-spinner-gap" style="font-size: 3rem; animation: spin 1s linear infinite;"></i>
            </div>
        </div>

        <div class="controls">
            <button class="ctrl-btn" onclick="toggleMute()" id="muteBtn" title="Toggle Audio"><i class="ph-fill ph-microphone"></i></button>
            <button class="ctrl-btn" onclick="toggleVideo()" id="vidBtn" title="Toggle Video"><i class="ph-fill ph-video-camera"></i></button>
            <button class="ctrl-btn danger" onclick="endCall()" title="End Call"><i class="ph-fill ph-phone-disconnect"></i></button>
        </div>
    </div>

    <script>
        let stream;
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = stream;
            } catch (err) {
                console.error("Camera access denied or unavailable", err);
                document.getElementById('waitingLayer').innerHTML = `
                    <i class="ph-fill ph-camera-slash" style="font-size: 4rem; color: #ef4444; margin-bottom: 1rem;"></i>
                    <h2 style="font-size: 2.5rem; margin-bottom: 1rem;">Camera Unavailable</h2>
                    <p style="color: #cbd5e1; font-size: 1.2rem;">Please grant camera permissions to continue the consultation.</p>
                `;
            }
        }
        
        startCamera();

        let isMuted = false;
        let isVidOff = false;

        function toggleMute() {
            if(!stream) return;
            isMuted = !isMuted;
            stream.getAudioTracks().forEach(track => track.enabled = !isMuted);
            const btn = document.getElementById('muteBtn');
            btn.innerHTML = isMuted ? '<i class="ph-fill ph-microphone-slash"></i>' : '<i class="ph-fill ph-microphone"></i>';
            if(isMuted) btn.classList.add('muted'); else btn.classList.remove('muted');
        }

        function toggleVideo() {
            if(!stream) return;
            isVidOff = !isVidOff;
            stream.getVideoTracks().forEach(track => track.enabled = !isVidOff);
            const btn = document.getElementById('vidBtn');
            btn.innerHTML = isVidOff ? '<i class="ph-fill ph-video-camera-slash"></i>' : '<i class="ph-fill ph-video-camera"></i>';
            if(isVidOff) btn.classList.add('muted'); else btn.classList.remove('muted');
        }

        function endCall() {
            if(stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            window.location.href = document.referrer || '/dashboard/patient';
        }

        let s = 0;
        setInterval(() => {
            s++;
            let m = Math.floor(s/60);
            let sec = s%60;
            document.getElementById('timer').innerText = `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
        }, 1000);
    </script>
</body>
</html>
